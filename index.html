<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>카페 메뉴</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f3f1ed;
}

/* 전체 */
.container {
    max-width: 500px;
    margin: auto;
    padding: 20px;
}

/* 제목 */
.title {
    text-align: center;
    font-size: 28px;
    font-weight: bold;
    color: #5d4037;
    margin-bottom: 20px;
}

/* 메뉴 카드 */
.menu-item {
    background: white;
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* 메뉴 이름 */
.name {
    font-size: 18px;
}

/* 가격 */
.price {
    font-weight: bold;
    color: #795548;
}

/* 모바일 */
@media (max-width: 480px) {
    .title {
        font-size: 24px;
    }

    .name {
        font-size: 16px;
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="title">☕ MENU</div>

    <div class="menu-item"><div class="name">아메리카노 (아아)</div><div class="price">3000원</div></div>
    <div class="menu-item"><div class="name">카페라떼</div><div class="price">4000원</div></div>
    <div class="menu-item"><div class="name">연유라떼</div><div class="price">4500원</div></div>
    <div class="menu-item"><div class="name">카페모카</div><div class="price">4500원</div></div>
    <div class="menu-item"><div class="name">아이스티</div><div class="price">3500원</div></div>
    <div class="menu-item"><div class="name">아샷추</div><div class="price">4000원</div></div>
    <div class="menu-item"><div class="name">해장주스</div><div class="price">5000원</div></div>
    <div class="menu-item"><div class="name">아인슈페너</div><div class="price">5000원</div></div>
    <div class="menu-item"><div class="name">밀크티</div><div class="price">4500원</div></div>

</div>

</body>
</html>
